{% extends "base.html" %}
{% block title %}Admin Login — Book Page{% endblock %}
{% block content %}
<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:24px">
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:400px">
    <div style="text-align:center;margin-bottom:32px">
      <div style="font-size:2rem;margin-bottom:12px">🔐</div>
      <h1 style="font-family:var(--font-serif);font-size:1.6rem">Admin Login</h1>
      <p style="color:var(--dim);font-size:.88rem;margin-top:6px">Book Page Dashboard</p>
    </div>
    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="admin" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-gold btn-block" style="margin-top:8px">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>
    </form>
    <p style="text-align:center;color:var(--dim);font-size:.8rem;margin-top:20px">Default: admin / admin123</p>
  </div>
</div>
{% endblock %}

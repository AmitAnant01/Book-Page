{% extends "base.html" %}
{% block title %}Login — Book Page{% endblock %}
{% block head %}
<style>
.auth-wrap{min-height:85vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(circle at 50% 0%,rgba(201,168,76,.06) 0%,transparent 60%)}
.auth-card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:44px 40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo .nav-logo{font-size:1.8rem}
.auth-title{font-family:var(--font-serif);font-size:1.5rem;text-align:center;margin-bottom:6px}
.auth-sub{text-align:center;color:var(--dim);font-size:.88rem;margin-bottom:28px}
.auth-divider{display:flex;align-items:center;gap:10px;color:var(--dim);font-size:.78rem;margin:22px 0;text-transform:uppercase;letter-spacing:.5px}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.auth-switch{text-align:center;font-size:.88rem;color:var(--dim);margin-top:18px}
.auth-switch a{color:var(--gold);font-weight:600}
.input-icon-wrap{position:relative}
.input-icon-wrap i{position:absolute;left:14px;top:42px;color:var(--dim);font-size:.85rem}
.input-icon-wrap input{padding-left:38px !important}
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo"><span class="nav-logo">Book<span>Page</span></span></div>
    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-sub">Login to continue exploring great reads</p>

    <form method="POST">
      <div class="form-group input-icon-wrap">
        <label>Email</label>
        <i class="fas fa-envelope"></i>
        <input type="email" name="email" placeholder="you@example.com" required autofocus>
      </div>
      <div class="form-group input-icon-wrap">
        <label>Password</label>
        <i class="fas fa-lock"></i>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-gold btn-block" style="margin-top:10px">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>
    </form>

    <div class="auth-switch">
      New here? <a href="{{ url_for('signup') }}">Create an account</a>
    </div>
  </div>
</div>
{% endblock %}
